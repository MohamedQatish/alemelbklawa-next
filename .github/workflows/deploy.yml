name: Deploy Alemlbklawa to Libya Spider

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Build and Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v3

    - name: 📦 Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 8 

    - name: ⚙️ Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'  
        cache: 'pnpm'

    - name: 📦 Install Dependencies
      run: pnpm install --no-frozen-lockfile

    - name: 🏗️ Build Project
      run: pnpm build 
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }} 
        NEXT_PUBLIC_APP_URL: https://alemelbklawa.ly

    - name: 📂 Sync Files via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./
        server-dir: ./
        # تم إضافة timeout كبير لضمان عدم الانقطاع
        timeout: 900000 
        # هذه الخاصية مهمة جداً لتقليل عدد الاتصالات المتوازية المتعبة للسيرفر
        log-level: verbose
        dangerous-clean-slate: true
        # الفلتر الذكي: نرفع فقط ما يحتاجه السيرفر للتشغيل
        exclude: |
         **/.git*
          **/node_modules/**
          **/.env*
          **/.vscode/**
          **/scripts/**
          **/*.sql
          **/README.md
          **/pnpm-lock.yaml
          **/src/**
          **/app/**
          **/components/**
          **/lib/**
          **/hooks/**
          **/styles/**
          .github/**